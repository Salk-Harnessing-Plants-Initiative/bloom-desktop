<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Rounded green background -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#5BB148"/>

  <!-- 2x2 plate grid outlines (white, subtle) -->
  <rect x="80" y="80" width="160" height="200" rx="12" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="3"/>
  <rect x="272" y="80" width="160" height="200" rx="12" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="3"/>
  <rect x="80" y="296" width="160" height="200" rx="12" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="3"/>
  <rect x="272" y="296" width="160" height="200" rx="12" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="3"/>

  <!-- Cotyledons (seedling leaves) at top -->
  <ellipse cx="232" cy="100" rx="22" ry="10" fill="#FFFFFF" transform="rotate(-25 232 100)"/>
  <ellipse cx="280" cy="100" rx="22" ry="10" fill="#FFFFFF" transform="rotate(25 280 100)"/>
  <circle cx="256" cy="108" r="6" fill="#FFFFFF"/>

  <!-- Main taproot -->
  <path d="M 256 110 L 256 420" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>

  <!-- Lateral roots -->
  <path d="M 256 180 Q 220 200 180 230 Q 160 260 165 295" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round"/>
  <path d="M 256 180 Q 292 200 332 230 Q 352 260 347 295" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round"/>
  <path d="M 256 270 Q 210 290 175 330 Q 155 370 162 410" fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round"/>
  <path d="M 256 270 Q 302 290 337 330 Q 357 370 350 410" fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round"/>
  <path d="M 256 360 Q 230 380 215 415" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>
  <path d="M 256 360 Q 282 380 297 415" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>

  <!-- Gravity arrow indicator (right edge) -->
  <path d="M 462 200 L 472 200 L 472 380 L 482 380 L 467 410 L 452 380 L 462 380 Z" fill="#FFFFFF" fill-opacity="0.5"/>
</svg>
